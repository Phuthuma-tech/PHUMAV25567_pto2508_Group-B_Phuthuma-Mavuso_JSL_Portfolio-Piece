<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon.svg" />
    <script defer src="./scripts/main.js" type="module"></script>
    <title>Kanban Task Management</title>
  </head>

  <body>
    <!-- Navigation Sidebar: logo, board links, theme toggle, hide button -->
    <nav class="side-bar" id="side-bar-div">
      <div id="side-logo-div">
        <img id="logo" src="./assets/logo-light.svg" alt="Kanban logo" />
      </div>

      <div class="boards-nav-links-div" id="boards-nav-links-div">
        <h4 id="headline-sidepanel">ALL BOARDS (1)</h4>
        <button class="board-btn">Launch Career</button>
      </div>

      <!-- Sidebar footer: theme toggle + hide button -->
      <div class="sidebar-footer">
        <div class="theme-toggle-container">
          <img src="./assets/icon-light-theme.svg" alt="Light theme" />
          <label class="switch">
            <input type="checkbox" id="theme-switch" />
            <span class="slider round"></span>
          </label>
          <img src="./assets/icon-dark-theme.svg" alt="Dark theme" />
        </div>

        <button id="hide-side-bar-btn" class="hide-sidebar-btn">
          <img src="./assets/icon-hide-sidebar.svg" alt="Hide sidebar icon" />
          <span>Hide Sidebar</span>
        </button>
      </div>
    </nav>

    <!-- Show Sidebar tab: only visible when sidebar is hidden -->
    <button id="show-side-bar-btn" class="show-sidebar-btn" aria-label="Show Sidebar">
      👁️
    </button>

    <!-- Main Layout -->
    <div id="layout">
      <header id="header" class="sticky-header">
        <div class="header-name-div">
          <!-- Mobile: tap logo to open sidebar as menu -->
          <img src="./assets/favicon.svg" alt="Open menu" class="logo-mobile" />
          <h2 class="header-board-name" id="header-board-name">Launch Career</h2>
        </div>
        <button id="add-new-task-btn" class="primary-btn">+ Add New Task</button>
      </header>

      <!-- Loading & error feedback -->
      <p id="loading-indicator" style="display:none; padding:20px; text-align:center;">
        Loading tasks…
      </p>
      <p id="error-message" style="display:none; padding:20px; text-align:center; color:#ea5555;"></p>

      <div class="container">
        <main class="card-column-main">
          <!-- TODO Column -->
          <div class="column-div" data-status="todo">
            <div id="todo-head-div" class="column-head-div">
              <span class="dot" id="todo-dot"></span>
              <h4 id="toDoText" class="columnHeader">TODO (0)</h4>
            </div>
            <div class="tasks-container"></div>
          </div>

          <!-- DOING Column -->
          <div class="column-div" data-status="doing">
            <div id="doing-head-div" class="column-head-div">
              <span class="dot" id="doing-dot"></span>
              <h4 id="doingText" class="columnHeader">DOING (0)</h4>
            </div>
            <div class="tasks-container"></div>
          </div>

          <!-- DONE Column -->
          <div class="column-div" data-status="done">
            <div id="done-head-div" class="column-head-div">
              <span class="dot" id="done-dot"></span>
              <h4 id="doneText" class="columnHeader">DONE (0)</h4>
            </div>
            <div class="tasks-container"></div>
          </div>
        </main>
      </div>
    </div>

    <!-- Edit Task Modal -->
    <dialog id="task-modal">
      <form method="dialog" id="task-form">
        <div class="modal-header">
          <h3>Edit Task</h3>
          <button type="button" class="close-btn" id="close-modal-btn">&times;</button>
        </div>

        <label for="task-title">Title</label>
        <input type="text" id="task-title" name="title" required />

        <label for="task-desc">Description</label>
        <textarea id="task-desc" name="description" rows="4"></textarea>

        <div class="input-div">
          <label for="task-status">Status</label>
          <select id="task-status" name="status" required>
            <option value="todo">todo</option>
            <option value="doing">doing</option>
            <option value="done">done</option>
          </select>
        </div>

        <div class="input-div">
          <label for="edit-task-priority">Priority</label>
          <select id="edit-task-priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="edit-button-group">
          <button type="submit" id="save-task-btn" class="primary-btn">Save Changes</button>
          <button type="button" id="delete-task-btn" class="delete-btn">Delete Task</button>
        </div>
      </form>
    </dialog>

    <!-- Add New Task Modal -->
    <dialog class="modal-overlay">
      <form class="modal-window" id="new-task-modal-window">
        <div class="modal-header">
          <h3 class="modal-title">Add New Task</h3>
          <span class="close-btn" id="cancel-add-btn">&times;</span>
        </div>

        <div class="input-div">
          <label class="label-modal-window" for="title-input">Title</label>
          <input
            type="text"
            class="modal-input"
            id="title-input"
            placeholder="e.g. Take a little break"
            required
          />
        </div>

        <div class="input-div">
          <label class="label-modal-window" for="desc-input">Description</label>
          <textarea
            name="description"
            id="desc-input"
            placeholder="e.g. Pet your dog, have a cup of coffee and come back to conquer this. 💪🏾"
            required
          ></textarea>
        </div>

        <div class="input-div">
          <label class="label-modal-window" for="select-status">Status</label>
          <select name="status" id="select-status" required>
            <option value="todo">todo</option>
            <option value="doing">doing</option>
            <option value="done">done</option>
          </select>
        </div>

        <div class="input-div">
          <label for="task-priority">Priority</label>
          <select id="task-priority" class="priority-select">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="button-group">
          <input type="submit" class="submit-btn" id="create-task-btn" value="Create Task" />
        </div>
      </form>
    </dialog>
  </body>
</html>
